<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repair Status | CellHub Pro</title>
<style>
  :root {
    --bg:       #0f172a;
    --card:     #1e293b;
    --border:   #334155;
    --text:     #f1f5f9;
    --muted:    #94a3b8;
    --accent:   #06b6d4;
    --success:  #10b981;
    --warning:  #f59e0b;
    --danger:   #ef4444;
    --info:     #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
  }
  .container { max-width: 480px; margin: 0 auto; }
  .logo {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .logo-name {
    font-size: 1.35rem;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 0.02em;
  }
  .logo-sub {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 1rem;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }
  .card-label {
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    margin-bottom: 0.4rem;
  }
  .card-value {
    font-size: 1rem;
    font-weight: 600;
    color: var(--text);
  }
  .ticket-number {
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--accent);
    font-family: monospace;
    letter-spacing: 0.05em;
  }
  /* Status badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.35rem 0.9rem;
    border-radius: 9999px;
    font-size: 0.85rem;
    font-weight: 700;
  }
  .badge-received  { background: rgba(59,130,246,0.15); color: var(--info); }
  .badge-progress  { background: rgba(245,158,11,0.15); color: var(--warning); }
  .badge-ready     { background: rgba(16,185,129,0.15); color: var(--success); }
  .badge-cancelled { background: rgba(239,68,68,0.15);  color: var(--danger); }

  /* Timeline */
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .timeline-step {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
    position: relative;
  }
  .timeline-step:not(:last-child)::after {
    content: '';
    position: absolute;
    left: 1.05rem;
    top: 2.1rem;
    bottom: -0.5rem;
    width: 2px;
    background: var(--border);
  }
  .timeline-step.done::after { background: var(--success); }
  .timeline-dot {
    width: 2.1rem;
    height: 2.1rem;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--card);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    flex-shrink: 0;
    z-index: 1;
  }
  .timeline-step.done .timeline-dot {
    border-color: var(--success);
    background: rgba(16,185,129,0.15);
  }
  .timeline-step.active .timeline-dot {
    border-color: var(--warning);
    background: rgba(245,158,11,0.15);
    box-shadow: 0 0 0 4px rgba(245,158,11,0.1);
  }
  .timeline-step.cancelled .timeline-dot {
    border-color: var(--danger);
    background: rgba(239,68,68,0.1);
  }
  .timeline-content { padding: 0.25rem 0 1.25rem; }
  .timeline-title {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text);
  }
  .timeline-step:not(.done):not(.active) .timeline-title { color: var(--muted); }
  .timeline-desc {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
  }
  /* Call button */
  .btn-call {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    width: 100%;
    padding: 0.875rem;
    background: var(--success);
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    border: none;
    border-radius: 0.75rem;
    text-decoration: none;
    cursor: pointer;
    margin-top: 0.5rem;
  }
  .btn-call:hover { opacity: 0.9; }
  /* Loading / error */
  .center { text-align: center; padding: 3rem 1rem; }
  .spinner {
    width: 2.5rem; height: 2.5rem;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-icon { font-size: 3rem; margin-bottom: 0.75rem; }
  .error-msg { color: var(--muted); font-size: 0.9rem; }
  .footer { text-align: center; font-size: 0.7rem; color: var(--muted); margin-top: 2rem; }
  /* Lang toggle */
  .lang-toggle {
    display: flex;
    justify-content: flex-end;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .lang-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.75rem;
    padding: 0.2rem 0.6rem;
    border-radius: 0.375rem;
    cursor: pointer;
  }
  .lang-btn.active { border-color: var(--accent); color: var(--accent); }
  /* Ready pulse */
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
    50%       { box-shadow: 0 0 0 8px rgba(16,185,129,0); }
  }
  .badge-ready { animation: pulse 2s ease-in-out infinite; }
</style>
</head>
<body>
<div class="container">

  <!-- Lang toggle -->
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="btn-es" onclick="setLang('es')">ES</button>
  </div>

  <!-- Logo -->
  <div class="logo">
    <div class="logo-name" id="store-name">📱 CellHub Pro</div>
    <div class="logo-sub" id="store-address"></div>
  </div>

  <!-- Content area -->
  <div id="content">
    <div class="center">
      <div class="spinner"></div>
      <div id="loading-text">Loading…</div>
    </div>
  </div>

  <div class="footer" id="footer-text">Powered by CellHub Pro</div>
</div>

<script>
// ── i18n ──────────────────────────────────────────────────
const T = {
  en: {
    loading:      'Loading…',
    notFound:     'Repair ticket not found.',
    notFoundSub:  'Check your link or contact the store.',
    error:        'Could not load repair status.',
    errorSub:     'Please try again or call the store.',
    noToken:      'No tracking code in the link.',
    ticket:       'Ticket #',
    device:       'Device',
    issue:        'Issue',
    balance:      'Balance Due',
    estimated:    'Est. Completion',
    callUs:       'Call Us',
    steps: {
      received:    ['📥 Received',          'We have your device'],
      diagnosing:  ['🔍 Diagnosing',        'Checking your device'],
      parts:       ['⏳ Waiting for Parts', 'Parts on the way'],
      in_progress: ['🔧 In Repair',         'Our tech is working on it'],
      ready:       ['✅ Ready for Pickup!', 'Come grab your device'],
      picked_up:   ['🏠 Picked Up',         'Repair complete'],
      cancelled:   ['❌ Cancelled',         'This repair was cancelled'],
    },
    footer: 'Powered by CellHub Pro',
  },
  es: {
    loading:      'Cargando…',
    notFound:     'Ticket de reparación no encontrado.',
    notFoundSub:  'Verifica tu link o contacta la tienda.',
    error:        'No se pudo cargar el estado.',
    errorSub:     'Intenta de nuevo o llama a la tienda.',
    noToken:      'No hay código de seguimiento en el link.',
    ticket:       'Ticket #',
    device:       'Dispositivo',
    issue:        'Problema',
    balance:      'Saldo Pendiente',
    estimated:    'Entrega Estimada',
    callUs:       'Llámanos',
    steps: {
      received:    ['📥 Recibido',          'Ya tenemos tu equipo'],
      diagnosing:  ['🔍 Diagnóstico',       'Revisando tu equipo'],
      parts:       ['⏳ Esperando Partes',  'Las partes están en camino'],
      in_progress: ['🔧 En Reparación',     'Nuestro técnico está trabajando'],
      ready:       ['✅ ¡Listo para Recoger!', 'Ya puedes pasar a recoger'],
      picked_up:   ['🏠 Entregado',         'Reparación completada'],
      cancelled:   ['❌ Cancelado',         'Esta reparación fue cancelada'],
    },
    footer: 'Powered by CellHub Pro',
  },
};

let lang = localStorage.getItem('cellhub_lang') || 'en';
let repairData = null;
let storeConfig = null;

function t(key) { return T[lang][key] || T.en[key] || key; }
function tStep(status) {
  const steps = T[lang].steps;
  return steps[status] || steps[status?.replace(/ /g,'_')?.toLowerCase()] || ['❓ Unknown', status || ''];
}

function setLang(l) {
  lang = l;
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-es').classList.toggle('active', l === 'es');
  document.getElementById('loading-text').textContent = t('loading');
  document.getElementById('footer-text').textContent = t('footer');
  if (repairData) renderRepair(repairData, storeConfig);
}

// ── Status → timeline step order ─────────────────────────
const STATUS_ORDER = ['received','diagnosing','parts','in_progress','ready','picked_up'];
const STATUS_ALIAS = {
  'Received':    'received',
  'In Progress': 'in_progress',
  'Complete':    'ready',
  'Cancelled':   'cancelled',
  'complete':    'ready',
  'waiting_parts': 'parts',
};

function normalizeStatus(s) {
  return STATUS_ALIAS[s] || s || 'received';
}

function statusBadgeClass(s) {
  if (['ready','Complete','complete','picked_up'].includes(s)) return 'badge-ready';
  if (['in_progress','In Progress','diagnosing','parts','waiting_parts'].includes(s)) return 'badge-progress';
  if (['cancelled','Cancelled'].includes(s)) return 'badge-cancelled';
  return 'badge-received';
}

// ── Render ────────────────────────────────────────────────
function renderRepair(repair, store) {
  const status = normalizeStatus(repair.status);
  const isCancelled = status === 'cancelled';
  const stepIndex = isCancelled ? -1 : STATUS_ORDER.indexOf(status);

  // Store header
  const storeName = store?.storeName || repair.storeName || 'Your Repair Shop';
  const storePhone = store?.storePhone || repair.storePhone || '';
  const storeAddr  = store?.storeAddress || repair.storeAddress || '';
  document.getElementById('store-name').textContent = '📱 ' + storeName;
  document.getElementById('store-address').textContent = storeAddr;

  const ticketNum = repair.ticketNumber || repair.id?.slice(-8).toUpperCase() || '—';
  const device    = [repair.brand, repair.model].filter(Boolean).join(' ') || repair.device || repair.deviceModel || '—';
  const issue     = repair.issue || '—';
  const balance   = (repair.balance || 0) > 0
    ? '$' + (repair.balance / 100).toFixed(2)
    : null;
  const estDate   = repair.estimatedCompletion
    ? new Date(repair.estimatedCompletion).toLocaleDateString(lang === 'es' ? 'es-MX' : 'en-US', { weekday: 'short', month: 'short', day: 'numeric' })
    : null;

  // Badge label
  const [stepLabel] = tStep(status);

  // Timeline steps (skip picked_up if not there yet, skip cancelled flow)
  const timelineSteps = isCancelled
    ? [['received','diagnosing','parts','in_progress'].slice(0, Math.max(1, stepIndex + 1)), ['cancelled']]
        .flat()
        .map(s => ({ key: s, done: false, active: s === 'cancelled', cancelled: true }))
    : STATUS_ORDER.map((key, i) => ({
        key,
        done:   i < stepIndex,
        active: i === stepIndex,
        cancelled: false,
      }));

  const html = `
    <!-- Ticket header -->
    <div class="card" style="border-color:rgba(6,182,212,0.3)">
      <div class="card-label">${t('ticket')}</div>
      <div class="ticket-number">${ticketNum}</div>
      <div style="margin-top:0.75rem">
        <span class="badge ${statusBadgeClass(repair.status)}">${stepLabel}</span>
      </div>
    </div>

    <!-- Device info -->
    <div class="card">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
        <div>
          <div class="card-label">${t('device')}</div>
          <div class="card-value">${device}</div>
        </div>
        ${balance ? `
        <div>
          <div class="card-label">${t('balance')}</div>
          <div class="card-value" style="color:var(--warning)">${balance}</div>
        </div>` : ''}
        <div ${balance ? '' : 'style="grid-column:1/-1"'}>
          <div class="card-label">${t('issue')}</div>
          <div class="card-value" style="font-size:0.875rem">${issue}</div>
        </div>
        ${estDate ? `
        <div>
          <div class="card-label">${t('estimated')}</div>
          <div class="card-value" style="font-size:0.875rem">${estDate}</div>
        </div>` : ''}
      </div>
    </div>

    <!-- Timeline -->
    <div class="card">
      <div class="timeline">
        ${timelineSteps.map(({ key, done, active, cancelled }) => {
          const [label, desc] = tStep(key);
          const cls = cancelled ? 'cancelled' : done ? 'done' : active ? 'active' : '';
          const icon = cancelled ? '❌' : done ? '✓' : active ? '●' : '○';
          return `
            <div class="timeline-step ${cls}">
              <div class="timeline-dot">${icon}</div>
              <div class="timeline-content">
                <div class="timeline-title">${label}</div>
                ${active || done ? `<div class="timeline-desc">${desc}</div>` : ''}
              </div>
            </div>`;
        }).join('')}
      </div>
    </div>

    <!-- Call button -->
    ${storePhone ? `
    <a class="btn-call" href="tel:${storePhone.replace(/\D/g,'')}">
      📞 ${t('callUs')} — ${storePhone}
    </a>` : ''}
  `;

  document.getElementById('content').innerHTML = html;
}

function renderError(type) {
  const icon   = type === 'notFound' ? '🔍' : '⚠️';
  const msg    = t(type);
  const sub    = t(type === 'notFound' ? 'notFoundSub' : 'errorSub');
  document.getElementById('content').innerHTML = `
    <div class="center">
      <div class="error-icon">${icon}</div>
      <div style="font-weight:700;margin-bottom:0.5rem">${msg}</div>
      <div class="error-msg">${sub}</div>
    </div>`;
}

// ── Firestore REST query ──────────────────────────────────
async function fetchRepair(token) {
  // Try to get firebase config from localStorage (set by CellHub Pro on same domain)
  // Falls back to reading from a meta tag you can inject server-side
  let cfg = null;
  try {
    const raw = localStorage.getItem('cellhub_firebase_config');
    if (raw) cfg = JSON.parse(raw);
  } catch {}

  // Also try the meta tag approach
  if (!cfg) {
    const meta = document.querySelector('meta[name="firebase-config"]');
    if (meta) {
      try { cfg = JSON.parse(meta.getAttribute('content')); } catch {}
    }
  }

  if (!cfg?.projectId || !cfg?.apiKey) {
    // No config found — show a fallback message instead of an error
    renderError('error');
    console.warn('[CellHub] Firebase config not found. Add a <meta name="firebase-config"> tag or ensure localStorage has cellhub_firebase_config.');
    return;
  }

  const { projectId, apiKey } = cfg;

  // Also fetch store settings for display
  try {
    const settingsUrl = `https://firestore.googleapis.com/v1/projects/${projectId}/databases/(default)/documents/settings/store?key=${apiKey}`;
    const sRes = await fetch(settingsUrl);
    if (sRes.ok) {
      const sJson = await sRes.json();
      storeConfig = firestoreDocToObj(sJson);
    }
  } catch {}

  // Query repairTickets where trackingToken == token
  const queryUrl = `https://firestore.googleapis.com/v1/projects/${projectId}/databases/(default)/documents:runQuery?key=${apiKey}`;
  const body = {
    structuredQuery: {
      from: [{ collectionId: 'repairTickets' }],
      where: {
        fieldFilter: {
          field:  { fieldPath: 'trackingToken' },
          op:     'EQUAL',
          value:  { stringValue: token },
        },
      },
      limit: 1,
    },
  };

  const res = await fetch(queryUrl, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(body),
  });

  if (!res.ok) throw new Error(`Firestore ${res.status}`);

  const results = await res.json();
  // runQuery returns array; first element has .document if found
  const doc = results?.[0]?.document;
  if (!doc) { renderError('notFound'); return; }

  repairData = firestoreDocToObj(doc);
  renderRepair(repairData, storeConfig);
}

// Convert Firestore REST document fields to plain JS object
function firestoreDocToObj(doc) {
  if (!doc?.fields) return {};
  const obj = {};
  for (const [key, val] of Object.entries(doc.fields)) {
    obj[key] = extractValue(val);
  }
  // Inject id from document name
  if (doc.name) obj.id = doc.name.split('/').pop();
  return obj;
}

function extractValue(val) {
  if (val.stringValue  !== undefined) return val.stringValue;
  if (val.integerValue !== undefined) return parseInt(val.integerValue, 10);
  if (val.doubleValue  !== undefined) return val.doubleValue;
  if (val.booleanValue !== undefined) return val.booleanValue;
  if (val.timestampValue !== undefined) return val.timestampValue;
  if (val.nullValue    !== undefined) return null;
  if (val.arrayValue   !== undefined) return (val.arrayValue.values || []).map(extractValue);
  if (val.mapValue     !== undefined) return firestoreDocToObj({ fields: val.mapValue.fields });
  return null;
}

// ── Boot ──────────────────────────────────────────────────
(async () => {
  // Sync lang button state
  document.getElementById('btn-en').classList.toggle('active', lang === 'en');
  document.getElementById('btn-es').classList.toggle('active', lang === 'es');
  document.getElementById('loading-text').textContent = t('loading');

  const params = new URLSearchParams(window.location.search);
  const token  = params.get('t') || params.get('token');

  if (!token) { renderError('notFound'); return; }

  try {
    await fetchRepair(token);
  } catch (err) {
    console.error('[CellHub status page]', err);
    renderError('error');
  }
})();
</script>
</body>
</html>
